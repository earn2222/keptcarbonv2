services:
  # ── Next.js application ────────────────────────
  nextjs:
    build: ./next
    ports:
      - "3000:3000"
    container_name: keptcarbon-nextjs
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CALLBACK_URL=${LINE_CALLBACK_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GEE_SERVICE_URL=http://gee:8000
    volumes:
      - ./next:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgis:
        condition: service_healthy
      gee:
        condition: service_started
    restart: unless-stopped

  # ── Google Earth Engine microservice ──────────
  gee:
    build: ./gee
    container_name: keptcarbon-gee
    ports:
      - "8001:8000"
    environment:
      - GEE_KEY_FILE=/run/secrets/gee_key.json
      - GEE_PROJECT_ID=${GEE_PROJECT_ID}
      - RUBBER_DATA_ROOT=/workspace/data
    volumes:
      - ./gee/service_account.json:/run/secrets/gee_key.json:ro
      - ./data:/workspace/data
    restart: unless-stopped

  # ── PostgreSQL + PostGIS ───────────────────────
  postgis:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    container_name: keptcarbon-postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgis/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:

<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>เข้าสู่ระบบ - KeptCarbon</title>
  <meta name="description" content="เข้าสู่ระบบแพลตฟอร์ม KeptCarbon สำหรับจัดการสวนยางพาราและคาร์บอนเครดิต">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Poppins:wght@400;500;600;700&family=Raleway:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Vendor CSS -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="assets/css/main.css?v=2" rel="stylesheet">
  <link href="assets/css/keptcarbon.css" rel="stylesheet">

  <style>
    body { margin: 0; padding: 0; }
    .floating-leaf {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(132,169,140,0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: float-leaf 8s infinite ease-in-out;
    }
    @keyframes float-leaf {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
  </style>
</head>

<body>
  <!-- Floating particles -->
  <div class="floating-leaf" style="top:10%;left:5%;animation-delay:0s;"></div>
  <div class="floating-leaf" style="top:60%;left:80%;width:300px;height:300px;animation-delay:3s;"></div>
  <div class="floating-leaf" style="top:30%;left:60%;width:150px;height:150px;animation-delay:6s;"></div>

  <div class="auth-page">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <a href="index.html" style="text-decoration:none;">
          <div class="brand-name">Kept<span>Carbon</span></div>
        </a>
        <p>แพลตฟอร์มจัดการสวนยางพาราและคาร์บอนเครดิต</p>
      </div>

      <h2>เข้าสู่ระบบ</h2>
      <p class="subtitle">ยินดีต้อนรับกลับ! กรุณากรอกข้อมูลเพื่อเข้าสู่ระบบ</p>

      <!-- Alert -->
      <div id="login-alert" class="auth-alert" style="display:none;"></div>

      <!-- Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="auth-form-group">
          <label for="login-email">อีเมล</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope"></i>
            <input type="email" id="login-email" placeholder="กรอกอีเมลของคุณ" required autocomplete="email">
          </div>
        </div>
        <div class="auth-form-group">
          <label for="login-password">รหัสผ่าน</label>
          <div class="input-wrapper">
            <i class="bi bi-lock"></i>
            <input type="password" id="login-password" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-auth" id="login-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ
        </button>
      </form>

      <div class="auth-divider">หรือ</div>

      <div class="auth-link">
        ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิกใหม่</a>
      </div>
      <div class="auth-link mt-2">
        <a href="index.html"><i class="bi bi-arrow-left me-1"></i>กลับสู่หน้าหลัก</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const alertEl = document.getElementById('login-alert');
      const btn = document.getElementById('login-btn');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังเข้าสู่ระบบ...';

      setTimeout(() => {
        const result = Auth.login(email, password);
        if (result.success) {
          alertEl.className = 'auth-alert success';
          alertEl.textContent = '✓ เข้าสู่ระบบสำเร็จ! กำลังนำไปยังแดชบอร์ด...';
          alertEl.style.display = 'block';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        } else {
          alertEl.className = 'auth-alert error';
          alertEl.textContent = '✗ ' + result.message;
          alertEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ';
        }
      }, 600);
    }
  </script>
</body>
</html>
